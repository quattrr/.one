<!DOCTYPE html>
<html lang="en">
<head>
<title>404 - quattr.one</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="quattr.one" />
<link rel="manifest" href="/site.webmanifest" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="4;url=/" />
  <style>
    * { padding: 0; margin: 0; box-sizing: border-box; }

    .main {
      position: relative;
      background-color: #181614; 
      background-image: radial-gradient(rgba(45, 42, 38, 0.9), #0f0d0c 120%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: hsl(39deg 30% 64%); 
      font-family: monospace;
      text-shadow:
        0 0 10px hsl(39deg 30% 64% / 0.4),
        0 0 15px hsl(39deg 30% 64% / 0.3),
        0 0 20px hsl(39deg 30% 64% / 0.2),
        0 0 25px hsl(39deg 30% 64% / 0.1);
    }

    .main::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: 0 0 150px rgba(0, 0, 0, 0.85) inset;
      pointer-events: none;
    }

    .content {
      min-height: 200px;
      width: 90%;
      max-width: 500px;
      text-align: left;
      pointer-events: all;
    }

    .title {
      margin: 0;
      font-size: 3.5rem;
      display: block;
      margin-bottom: 24px;
      letter-spacing: -3px;
    }

    .cursor {
      background: hsl(39deg 30% 64%);
      width: 0.5em;
      height: 1em;
      display: inline-block;
      box-shadow:
        0 0 10px hsl(39deg 30% 64% / 0.4),
        0 0 15px hsl(39deg 30% 64% / 0.3),
        0 0 20px hsl(39deg 30% 64% / 0.2),
        0 0 25px hsl(39deg 30% 64% / 0.1);
      top: 4px;
      left: -24px;
      position: relative;
      animation: 1.3s infinite blink;
    }

    @keyframes blink {
      0% { opacity: 0; }
      49% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 1; }
    }

    .list {
      display: block;
      list-style: none;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 2.5rem;
        letter-spacing: -2px;
      }
      .cursor {
        left: -16px;
      }
      .list {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="vignette"></div>
    <div class="content">
      <h1 class="title">404
        <span class="cursor"></span>
      </h1>
      <ul class="list">
        <li>error: this page doesn't exist.</li>
        <li><br></li>
        <li>redirecting to root<span id="dots"></span></li>
      </ul>
    </div>
  </main>

  <script>
    // Animate the dots for the loading effect
    let dotCount = 0;
    const dotElement = document.getElementById('dots');
    
    setInterval(() => {
      dotCount = (dotCount + 1) % 4;
      dotElement.textContent = '.'.repeat(dotCount);
    }, 500);

    // Redirect to the main page after 4000 milliseconds (4 seconds)
    setTimeout(() => {
      window.location.href = "/";
    }, 4000);
  </script>
</body>
</html>
