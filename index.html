<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { padding: 0; margin: 0; box-sizing: border-box; }

    .main {
      position: relative;
      background-color: hsl(247deg 23% 15%);
      background-image: radial-gradient(rgb(42 39 63, 0.9), #1f1d2e 120%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: hsl(343deg 76% 68%);
      font-family: monospace;
      text-shadow:
        0 0 10px hsl(343deg 76% 68% / 0.4),
        0 0 15px hsl(343deg 76% 68% / 0.3),
        0 0 20px hsl(343deg 76% 68% / 0.2),
        0 0 25px hsl(343deg 76% 68% / 0.1);
    }

    .main::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: 0 0 120px rgba(0, 0, 0, 0.9) inset;
      pointer-events: none; /* <-- This line fixes the issue */
    }

    .content {
      min-height: 200px;
      min-width: 500px;
      text-align: left;
      pointer-events: all;
    }

    .title {
      margin: 0;
      font-size: 3.5rem;
      display: block;
      margin-bottom: 24px;
      letter-spacing: -3px; /* Added tighter letter-spacing */
      /* font-weight: 400; removed so it defaults to h1 bold */
    }

    .cursor {
      background: hsl(343deg 76% 68%);
      width: 0.5em;
      height: 1em;
      display: inline-block;
      box-shadow:
        0 0 10px hsl(343deg 76% 68% / 0.4),
        0 0 15px hsl(343deg 76% 68% / 0.3),
        0 0 20px hsl(343deg 76% 68% / 0.2),
        0 0 25px hsl(343deg 76% 68% / 0.1);
      top: 4px;
      left: -24px;
      position: relative;
      animation: 1.3s infinite blink;
    }

    @keyframes blink {
      0% { opacity: 0; }
      49% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 1; }
    }

    .list {
      display: block;
      list-style: none;
      font-size: 1.2rem;
    }

    .main a {
      color: inherit;
      text-decoration: underline;
      transition: text-shadow 0.1s linear;
    }

    .main a:hover {
      text-shadow:
        0 0 12px hsl(343deg 76% 68% / 0.7),
        0 0 17px hsl(343deg 76% 68% / 0.4),
        0 0 22px hsl(343deg 76% 68% / 0.4),
        0 0 27px hsl(343deg 76% 68% / 0.3);
    }

    .main a:visited {
      color: hsl(343deg 76% 68%);
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="vignette"></div>
    <div class="content">
      <h1 class="title">coder.pink
        <span class="cursor"></span>
      </h1>
      <ul class="list">
        <li>threads: <a href="https://threads.net/coder.pink">@coder.pink</a></li>
        <li>games: &nbsp;
          <a href="https://fuchsia-studios.itch.io">itch.io</a>
        </li>
        <li>company: discord</li>
      </ul>
    </div>
  </main>
</body>
</html>
