<!DOCTYPE html>
<html lang="en">
<head>
<title>quattr.one</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="quattr.one" />
  <meta property="og:type" content="website" />
    <meta property="og:title" content="quattr.one" />
    <meta property="og:url" content="https://quattr.one" />
    <meta property="og:description" content="hello!" />
    <meta property="og:image" content="https://quattrr.github.io/kirby.png" />
    <meta name="theme-color" content="#d3d6f1" />
    <meta name="twitter:card" content="summary" />

<link rel="manifest" href="/site.webmanifest" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { padding: 0; margin: 0; box-sizing: border-box; }

    .main {
      position: relative;
      background-color: #181614; 
      background-image: radial-gradient(rgba(45, 42, 38, 0.9), #0f0d0c 120%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: hsl(39deg 30% 64%); 
      font-family: monospace;
      text-shadow:
        0 0 10px hsl(39deg 30% 64% / 0.4),
        0 0 15px hsl(39deg 30% 64% / 0.3),
        0 0 20px hsl(39deg 30% 64% / 0.2),
        0 0 25px hsl(39deg 30% 64% / 0.1);
    }

    .main::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      background: repeating-linear-gradient(
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: 0 0 150px rgba(0, 0, 0, 0.85) inset;
      pointer-events: none;
    }

    .content {
      min-height: 200px;
      width: 90%;
      max-width: 500px;
      text-align: left;
      pointer-events: all;
    }

    .title {
      margin: 0;
      font-size: 3.5rem;
      display: block;
      margin-bottom: 24px;
      letter-spacing: -3px;
    }

    .cursor {
      background: hsl(39deg 30% 64%);
      width: 0.5em;
      height: 1em;
      display: inline-block;
      box-shadow:
        0 0 10px hsl(39deg 30% 64% / 0.4),
        0 0 15px hsl(39deg 30% 64% / 0.3),
        0 0 20px hsl(39deg 30% 64% / 0.2),
        0 0 25px hsl(39deg 30% 64% / 0.1);
      top: 4px;
      left: -24px;
      position: relative;
      animation: 1.3s infinite blink;
    }

    @keyframes blink {
      0% { opacity: 0; }
      49% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 1; }
    }

    .list {
      display: block;
      list-style: none;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .main a {
      color: inherit;
      text-decoration: underline;
      transition: text-shadow 0.1s linear;
    }

    .main a:hover {
      text-shadow:
        0 0 12px hsl(39deg 30% 64% / 0.7),
        0 0 17px hsl(39deg 30% 64% / 0.4),
        0 0 22px hsl(39deg 30% 64% / 0.4),
        0 0 27px hsl(39deg 30% 64% / 0.3);
    }

    .main a:visited {
      color: hsl(39deg 30% 64%);
    }

    #tz-comparison {
      opacity: 0.7;
      font-size: 0.95rem;
      margin-left: 8px;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 2.5rem;
        letter-spacing: -2px;
      }
      .cursor {
        left: -16px;
      }
      .list {
        font-size: 1rem;
      }
      #tz-comparison {
        display: block; 
        margin-left: 0;
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="vignette"></div>
    <div class="content">
      <h1 class="title">quattr.one
        <span class="cursor"></span>
      </h1>
      <ul class="list">
        <li>instagram: <a href="https://instagram.com/alex.4ne" target="_blank">@alex.4ne</a></li>
        <li>last.fm: &nbsp;&nbsp;<a href="https://www.last.fm/user/aqlex" target="_blank">aqlex</a></li>
        <li>mac: <a href="https://mac.quattr.one" target="_blank">mac.quattr.one</a></li>
        <li>timezone: &nbsp;<span id="live-time">00:00</span> <span id="tz-comparison"></span></li>
      </ul>
    </div>
  </main>

  <script>
    function updateTimezone() {
      const now = new Date();

      const timeOptions = { timeZone: 'Europe/Rome', hour: '2-digit', minute: '2-digit', hour12: false };
      const tzOptions = { timeZone: 'Europe/Rome', timeZoneName: 'short' };
      
      const timeString = new Intl.DateTimeFormat('en-US', timeOptions).format(now);
      const tzNameString = new Intl.DateTimeFormat('en-US', tzOptions).format(now).split(' ').pop();

      document.getElementById('live-time').textContent = `${timeString} ${tzNameString}`;

      const getZoneRecord = (tz) => {
        const formatter = new Intl.DateTimeFormat('en-US', {
          timeZone: tz, year: 'numeric', month: 'numeric', day: 'numeric',
          hour: 'numeric', minute: 'numeric', hour12: false
        });
        const parts = formatter.formatToParts(new Date()).reduce((acc, p) => ({ ...acc, [p.type]: p.value }), {});
        return Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute);
      };

      try {
        const localMs = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes());
        const targetMs = getZoneRecord('Europe/Rome');
        const diffHours = Math.round((targetMs - localMs) / (1000 * 60 * 60));

        let comparisonText = "";
        if (diffHours === 0) {
          comparisonText = "(same timezone)";
        } else if (diffHours > 0) {
          comparisonText = `(${diffHours}h ahead of you)`;
        } else {
          comparisonText = `(${Math.abs(diffHours)}h behind you)`;
        }
        
        document.getElementById('tz-comparison').textContent = comparisonText;
      } catch (e) {
        document.getElementById('tz-comparison').textContent = "";
      }
    }

    updateTimezone();
    setInterval(updateTimezone, 60000);
  </script>
</body>
</html>
